[[repos]]
repo = "local"
hooks = [
  { id = "gitleaks", name = "Gitleaks", language = "system", entry = "gitleaks git --staged --pre-commit --no-banner --log-level error", stages = ["pre-commit"], pass_filenames = false },
  { id = "standardrb", name = "StandardRB", language = "system", entry = "bundle exec standardrb --no-fix", types = ["ruby"], stages = ["pre-commit"] },
  { id = "block-gitbutler", name = "Block gitbutler branches", language = "system", entry = "bash -c '! git rev-parse --abbrev-ref HEAD | grep -q \"^gitbutler/\"'", stages = ["pre-push"], pass_filenames = false },
  { id = "rspec", name = "RSpec", language = "system", entry = "bundle exec rspec --exclude-pattern 'spec/system/**/*_spec.rb'", stages = ["pre-push"], pass_filenames = false },
  { id = "sorbet", name = "Sorbet TC", language = "system", entry = "bundle exec srb tc", stages = ["pre-push"], pass_filenames = false },
]
